name: Build Android APK (AI Production System)

on:
  push:
    branches:
      - main  # আপনি যে ব্রাঞ্চে পুশ করলে বিল্ড করতে চান (যেমন: master বা main)
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. গিটহাব থেকে কোড চেকআউট করা
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. জাভা এনভায়রনমেন্ট সেটআপ করা (অ্যান্ড্রয়েড বিল্ডের জন্য জরুরি)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # ৩. অ্যান্ড্রয়েড SDK সেটআপ করা
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ৪. নোড জেএস সেটআপ করা (যদি Cordova/Capacitor ব্যবহার করে HTML-কে অ্যাপ বানান)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ৫. ডিপেন্ডেন্সি ইনস্টল এবং হাইব্রিড অ্যাপ বিল্ড (Example using Capacitor)
      - name: Install Dependencies & Build Android Project
        run: |
          npm install
          # আপনার প্রজেক্ট যদি Capacitor বা Cordova ব্যবহার করে, তবে বিল্ড কমান্ড এখানে হবে:
          # npx cap init "AI Video System" "com.ai.videosystem" --web-dir=.
          # npx cap add android
          # npx cap sync

      # ৬. গ্র্যাডল (Gradle) কে এক্সিকিউটেবল পারমিশন দেওয়া
      - name: Grant Execute Permission for Gradle
        run: chmod +x android/gradlew
        continue-on-error: true # যদি সরাসরি অ্যান্ড্রয়েড সোর্স কোড হয় তবেই এটি চলবে

      # ৭. ফাইনাল APK বিল্ড করা (Debug APK)
      - name: Build Android Debug APK
        run: |
          if [ -d "android" ]; then
            cd android && ./gradlew assembleDebug
          else
            echo "No native android folder found. Please ensure your wrapper framework is configured."
          fi

      # ৮. জেনারেট হওয়া APK ফাইলটি গิทাবে আপলোড করা (যাতে আপনি ডাউনলোড করতে পারেন)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-video-system-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
